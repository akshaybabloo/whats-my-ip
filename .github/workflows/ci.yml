name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned for reproducible CI; bump intentionally when upgrading Bun.
          bun-version: 1.3.13

      - run: bun install --frozen-lockfile

      - run: bun run lint

      - run: bun run check

      - run: bun run test
